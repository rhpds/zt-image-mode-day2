---
virtualmachines:
  - name: "builder"
    image: "rhel-10-2-eus-06-08-26"
    bootloader: efi
    memory: "4G"
    cores: 4
    image_size: "40G"
    tags:
      - key: "AnsibleGroup"
        value: "bastions"
    networks:
      - default
    services:
      - name: registry-http
        ports:
          - port: 80
            protocol: TCP
            targetPort: 80
            name: registry-http
      - name: registry
        ports:
          - port: 443
            protocol: TCP
            targetPort: 443
            name: registry
    routes:
      - name: registry-http
        host: registry
        service: registry-http
        targetPort: 80
        tls: false
        path: "/.well-known/"
      - name: registry
        host: registry
        service: registry
        targetPort: 443
        tls: true

  - name: "imrhel"
    image: "rhel-10-2-eus-06-08-26"
    bootloader: efi
    memory: "4G"
    cores: 2
    image_size: "40G"
    tags:
      - key: "AnsibleGroup"
        value: "nodes"
    networks:
      - default
